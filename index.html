<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>دخول موقع - مطعم الوجبات الشهية</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>مطعم الوجبات الشهية</h1>
    <p class="subtitle">نظام متكامل لإدارة طلبات مطعم الوجبات الشهية</p>
  </header>
  <div class="container">
    <form class="form-card" onsubmit="return login()">
      <h2>تسجيل الدخول</h2>
      <div class="input-group">
        <input type="text" id="user" placeholder=" " required>
        <label for="user">اسم المستخدم</label>
      </div>
      <div class="input-group">
        <input type="password" id="pass" placeholder=" " required>
        <label for="pass">كلمة المرور</label>
      </div>
      <button type="submit" class="btn-block">دخول</button>
    </form>
  </div>
  <footer>
        <p> 2026 مطعم الوجبات الشهية - مشروع تقنيات الويب</p>
  </footer>
  <script>
    function login() {
        window.location.href = "html/home.html";
        return false;
        }
  </script>
</body>
</html>
